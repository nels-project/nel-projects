<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEL-Scripts</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" id="favicon" href="">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000000;
    font-family: 'Inter', sans-serif;
    color: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 60px;
    overflow-x: hidden;
  }

  /* Glow blobs background */
  body::before {
    content: '';
    position: fixed;
    top: -200px;
    left: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,200,100,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(80,60,200,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    width: 100%;
    max-width: 760px;
    position: relative;
    z-index: 1;
  }

  /* CARD CONTAINER */
  .card {
    background: #0f0f0f;
    border: 1px solid #1f1f1f;
    border-radius: 20px;
    padding: 28px 28px 32px;
    width: 100%;
  }

  /* PROFILE HEADER */
  .profile {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .profile-left { display: flex; align-items: center; gap: 14px; }

  .avatar {
    width: 80px;
    height: 80px;
    border-radius: 14px;
    background: transparent;
    border: 2px solid #00c864;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 800;
    color: #00c864;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(0,200,100,0.15);
  }

  .profile-info { display: flex; flex-direction: column; gap: 3px; }

  .profile-name {
    font-size: 18px;
    font-weight: 700;
    color: #ffffff;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .profile-handle {
    font-size: 13px;
    color: #555;
    font-weight: 400;
  }

  .profile-bio {
    font-size: 13px;
    color: #888;
    margin-top: 2px;
  }

  .profile-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
  }

  .stats {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .stat {
    font-size: 13px;
    color: #555;
  }

  .stat strong { color: #aaa; font-weight: 600; }

  .socials {
    display: flex;
    gap: 6px;
  }

  .social-icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 13px;
    color: #888;
    transition: border-color 0.2s, color 0.2s;
  }

  .social-icon:hover { border-color: #00c864; color: #00c864; }

  /* LINKS COUNT */
  .links-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-top: 1px solid #1a1a1a;
    padding-top: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .links-label span { color: #333; }

  /* SEARCH */
  .search-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .search-wrap input {
    width: 100%;
    background: #141414;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 10px 14px 10px 36px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: #00c864; }
  .search-wrap input::placeholder { color: #444; }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #444;
    font-size: 15px;
  }

  /* GRID WRAP */
  .grid-wrap {
    height: 570px;
    overflow-y: scroll;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: #444 #1a1a1a;
    border-radius: 10px;
  }

  .grid-wrap::-webkit-scrollbar { width: 8px; }
  .grid-wrap::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 4px; }
  .grid-wrap::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
  .grid-wrap::-webkit-scrollbar-thumb:hover { background: #555; }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  /* SCRIPT CARD */
  .script-card {
    background: #141414;
    border: 1px solid #1f1f1f;
    border-radius: 14px;
    overflow: hidden;
    text-decoration: none;
    color: #fff;
    display: block;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeUp 0.4s ease both;
    cursor: pointer;
  }

  .script-card:hover {
    border-color: #2a2a2a;
    transform: translateY(-2px);
  }

  .thumb-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    overflow: hidden;
    background: #1a1a1a;
  }

  .thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }

  .script-card:hover .thumb-wrap img { transform: scale(1.04); }

  /* FREE badge overlay on image */
  .free-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(0,0,0,0.75);
    color: #00c864;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 5px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid rgba(0,200,100,0.3);
  }

  /* Arrow button */
  .arrow-btn {
    position: absolute;
    bottom: 8px;
    right: 8px;
    width: 26px;
    height: 26px;
    background: rgba(255,255,255,0.1);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    backdrop-filter: blur(4px);
  }

  .card-meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px 4px;
  }

  .meta-pill {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: #555;
    background: #1a1a1a;
    border: 1px solid #222;
    padding: 3px 8px;
    border-radius: 6px;
  }

  .card-body { padding: 4px 10px 12px; }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: #ddd;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 8px;
    min-height: 36px;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .steps-badge {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: #555;
  }

  .date-label {
    font-size: 11px;
    color: #333;
  }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 2.5rem;
    color: #333;
    font-size: 13px;
    grid-column: 1/-1;
    display: none;
  }

  /* POWERED BY */
  .powered {
    margin-top: 20px;
    text-align: center;
    font-size: 12px;
    color: #333;
  }

  .powered span { color: #555; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .card { padding: 20px 16px 24px; }
    .profile { flex-direction: column; }
    .profile-right { align-items: flex-start; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .grid-wrap { max-height: 600px; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="card">

    <!-- PROFILE HEADER -->
    <div class="profile">
      <div class="profile-left">
        <div class="avatar" id="avatarEl">
          <!-- REPLACE the src below with your imgur image URL for your PFP -->
          <!-- Example: src="https://i.imgur.com/YOURIMAGE.png" -->
          <!-- If no image, it shows the N letter -->
          <img id="pfpImg" src="" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:12px;display:none;" />
          <span id="pfpLetter">N</span>
        </div>
        <div class="profile-info">
          <div class="profile-name">
            NEL-Scripts
            <span class="profile-handle">@nelsprojectgg</span>
          </div>
          <div class="profile-bio">#1 source for free Roblox scripts</div>
        </div>
      </div>
      <div class="profile-right">
        <div class="socials">
          <!-- YouTube -->
          <a class="social-icon" href="https://www.youtube.com/channel/UC8TMgkFkTuAP6UPnzruAdDw" target="_blank" title="YouTube">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:#ff0000">
              <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
            </svg>
          </a>
          <!-- Discord -->
          <a class="social-icon" href="https://discord.gg/pQvVdCbusV" target="_blank" title="Discord">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:#5865f2">
              <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

    <!-- LINKS LABEL + SEARCH -->
    <div class="links-label">
      <span id="linksLabel">NELSPROJECTGG'S LINKS</span>
    </div>

    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Search scripts..." oninput="filterScripts()" />
    </div>

    <!-- GRID -->
    <div class="grid-wrap">
      <div class="grid" id="grid">
        <div class="no-results" id="noResults">No scripts found.</div>
      </div>
    </div>

  </div>

  <div class="powered">Powered by <span>NEL-Scripts</span></div>
</div>

<script>
  // ================================================================
  // YOUR PROFILE IMAGES — paste imgur URLs here
  // 1. Go to imgur.com, upload your image, right click → Copy image address
  // ================================================================
  const PFP_URL = "https://i.imgur.com/2c2k7mY.png";
  const FAVICON_URL = "https://i.imgur.com/2c2k7mY.png";
  // ================================================================

  if (PFP_URL) {
    const img = document.getElementById('pfpImg');
    const letter = document.getElementById('pfpLetter');
    img.src = PFP_URL;
    img.style.display = 'block';
    letter.style.display = 'none';
  }
  if (FAVICON_URL) {
    document.getElementById('favicon').href = FAVICON_URL;
  }

  // ================================================================
  // ADD YOUR SCRIPTS HERE
  // id: short unique name, no spaces (used in your YouTube description link)
  // thumbnail: https://img.youtube.com/vi/VIDEO_ID/maxresdefault.jpg
  // title: your video title
  // link: your Work.ink / Linkvertise link
  //
  // Example YouTube description link:
  //   nelscripts.github.io?script=bloxfruits
  // ================================================================
  const scripts = [
    {
      id: "animeastral",
      title: "💥 NEW Anime Astral Script 2026 — Auto Progress, Fast Auto Click & Auto Farm! ⚔️",
      thumbnail: "https://img.youtube.com/vi/tuGFElfQUTo/maxresdefault.jpg",
      link: "https://unlk.link/7CA7H"
    },
    {
      id: "animeastral",
      title: "💥 NEW Anime Astral Script 2026 — Auto Progress, Fast Auto Click & Auto Farm! ⚔️",
      thumbnail: "https://img.youtube.com/vi/tuGFElfQUTo/maxresdefault.jpg",
      link: "https://unlk.link/7CA7H"
    },
    {
      id: "sniperarena",
      title: "Sniper Arena Script Showcase — AIMBOT, TRIGGER BOT, HITBOX EXPANDER & MORE!",
      thumbnail: "https://img.youtube.com/vi/OANd14MlFpI/maxresdefault.jpg",
      link: "https://unlk.link/q8BWA"
    },
    {
      id: "luckyblockrush",
      title: "*OP* Lucky Block Rush Script Showcase — GOD MODE, FAST AUTO TRAIN, AUTO FARM & MORE! 2026",
      thumbnail: "https://img.youtube.com/vi/66EsGQLNv7w/maxresdefault.jpg",
      link: "https://unlk.link/Xe2XH"
    },
    {
      id: "aotr",
      title: "Attack On Titan Revolution *OP* Script —AUTO FARM, MULTI HITS, INSTANT KILL & MORE! 2026",
      thumbnail: "https://img.youtube.com/vi/IhOcbgrERLY/maxresdefault.jpg",
      link: "https://unlk.link/iEPXO"
    },
    {
      id: "brokenblade1",
      title: "Broken Blade *DUPE* Script Showcase — INF ITEMS DUPE & MORE!",
      thumbnail: "https://img.youtube.com/vi/I4tZrBu3bZc/maxresdefault.jpg",
      link: "https://unlk.link/f8uwd"
    },
    {
      id: "brokenblade",
      title: "Broken Blade Script Showcase | Auto Farm, Auto Parry, Event Auto Farm & More!",
      thumbnail: "https://img.youtube.com/vi/BCU0SL4aU7I/maxresdefault.jpg",
      link: "https://unlk.link/rwIlT"
    },
    {
      id: "animepocalypse",
      title: "Anime Apocalypse Script — AUTO FARM, INSTANT KILL, AUTO RAID & MORE! (New Update!)",
      thumbnail: "https://img.youtube.com/vi/FRZ-R0NYMXk/maxresdefault.jpg",
      link: "https://linkunlocker.com/fract-hub-R0d56"
    },
  ];
  // ================================================================
  // NOTHING TO EDIT BELOW
  // ================================================================

  // Check if URL has ?script=ID
  const urlParam = new URLSearchParams(window.location.search).get('script');

  function renderCards(list) {
    const grid = document.getElementById('grid');
    const noResults = document.getElementById('noResults');
    grid.querySelectorAll('.script-card').forEach(c => c.remove());

    if (list.length === 0) { noResults.style.display = 'block'; return; }
    noResults.style.display = 'none';

    // If URL param exists, put matching script FIRST
    let sorted = [...list];
    if (urlParam) {
      const matchIndex = sorted.findIndex(s => s.id === urlParam);
      if (matchIndex > -1) {
        const [match] = sorted.splice(matchIndex, 1);
        sorted.unshift(match);
      }
    }

    sorted.forEach((s, i) => {
      const card = document.createElement('a');
      card.className = 'script-card';
      card.id = 'script-' + s.id;
      card.href = s.link;
      card.target = '_self';
      card.rel = 'noopener noreferrer';
      card.style.animationDelay = (i * 0.05) + 's';

      // Highlight matched card
      const isMatch = urlParam && s.id === urlParam;
      if (isMatch) {
        card.style.border = '2px solid #00c864';
        card.style.boxShadow = '0 0 16px rgba(0,200,100,0.3)';
      }

      card.innerHTML = `
        <div class="thumb-wrap">
          <img src="${s.thumbnail}" alt="${s.title}" loading="lazy"
            onerror="this.src='https://via.placeholder.com/480x270/141414/00c864?text=NEL'" />
          <div class="free-badge">${isMatch ? '⭐ THIS VIDEO' : ''}</div>
          <div class="arrow-btn">↗</div>
        </div>
        <div class="card-body">
          <div class="card-title">${s.title}</div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function filterScripts() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderCards(scripts.filter(s => s.title.toLowerCase().includes(q)));
  }

  renderCards(scripts);
</script>
</body>
</html>
